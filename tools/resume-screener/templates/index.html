<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screener</title>
    <style>
        :root {
            --navy: #1B365D;
            --blue: #2563eb;
            --green: #16a34a;
            --yellow: #d97706;
            --red: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            background: var(--navy);
            color: white;
            padding: 20px 0;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        header p {
            text-align: center;
            opacity: 0.8;
            font-size: 14px;
            margin-top: 4px;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .upload-card {
            background: white;
            border: 2px dashed var(--gray-300);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            transition: border-color 0.2s;
        }

        .upload-card:hover { border-color: var(--blue); }
        .upload-card.has-file { border-color: var(--green); border-style: solid; }

        .upload-card label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-700);
        }

        .upload-card input[type="file"] { margin: 8px 0; }

        .jd-input {
            background: white;
            border-radius: 8px;
            padding: 24px;
            border: 1px solid var(--gray-200);
        }

        .jd-input label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-700);
        }

        .jd-input textarea {
            width: 100%;
            height: 180px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            padding: 12px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
        }

        .jd-input textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .check-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
        }

        .check-toggle input { accent-color: var(--blue); }

        .btn {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: var(--gray-300); cursor: not-allowed; }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active { display: block; }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Results ──────────────────────────────── */

        .results { display: none; }
        .results.active { display: block; }

        .result-section {
            background: white;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
        }

        .result-header h2 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .score-badge.pass { background: var(--green); }
        .score-badge.warning { background: var(--yellow); }
        .score-badge.fail { background: var(--red); }

        .verdict {
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 500;
        }

        .verdict.pass { background: #dcfce7; color: #166534; }
        .verdict.warning { background: #fef3c7; color: #92400e; }
        .verdict.fail { background: #fee2e2; color: #991b1b; }

        .result-body {
            padding: 0 20px 20px;
        }

        .check-row {
            display: grid;
            grid-template-columns: 200px 60px 1fr;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-100);
            align-items: start;
        }

        .check-row:last-child { border-bottom: none; }

        .check-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--gray-700);
        }

        .check-score {
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }

        .check-score.high { color: var(--green); }
        .check-score.mid { color: var(--yellow); }
        .check-score.low { color: var(--red); }

        .check-detail {
            font-size: 13px;
            color: var(--gray-500);
        }

        .keyword-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }

        .tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 3px;
            font-family: monospace;
        }

        .tag.matched { background: #dcfce7; color: #166534; }
        .tag.missing { background: #fee2e2; color: #991b1b; }

        .flags-list {
            margin-top: 6px;
            padding-left: 16px;
        }

        .flags-list li {
            font-size: 12px;
            color: var(--red);
            margin-bottom: 4px;
        }

        .examples {
            margin-top: 6px;
            font-size: 12px;
        }

        .examples .good { color: var(--green); }
        .examples .bad { color: var(--red); }

        @media (max-width: 768px) {
            .upload-section { grid-template-columns: 1fr; }
            .check-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Resume Screener</h1>
            <p>AI Detection &middot; ATS Filter &middot; Human Recruiter Simulation</p>
        </div>
    </header>

    <div class="container">
        <div class="upload-section">
            <div class="upload-card" id="resumeCard">
                <label>Resume (PDF)</label>
                <input type="file" id="resumeFile" accept=".pdf,.txt,.md" onchange="fileSelected(this, 'resumeCard')">
                <p style="font-size:12px;color:var(--gray-500);margin-top:8px">Text-based PDF only (not scanned)</p>
            </div>
            <div class="jd-input">
                <label>Job Description</label>
                <textarea id="jdText" placeholder="Paste the full job description here, including required and preferred qualifications..."></textarea>
            </div>
        </div>

        <div class="controls">
            <label class="check-toggle">
                <input type="checkbox" id="checkAI" checked> AI Detection
            </label>
            <label class="check-toggle">
                <input type="checkbox" id="checkATS" checked> ATS Filter
            </label>
            <label class="check-toggle">
                <input type="checkbox" id="checkHuman" checked> Human Screener
            </label>
            <button class="btn" id="analyzeBtn" onclick="analyze()">Analyze Resume</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Running screening checks...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script>
        function fileSelected(input, cardId) {
            const card = document.getElementById(cardId);
            if (input.files.length > 0) {
                card.classList.add('has-file');
                card.querySelector('label').textContent = '✓ ' + input.files[0].name;
            }
        }

        function getScoreClass(score) {
            if (score >= 75) return 'high';
            if (score >= 50) return 'mid';
            return 'low';
        }

        function getBadgeClass(score) {
            if (score >= 75) return 'pass';
            if (score >= 50) return 'warning';
            return 'fail';
        }

        async function analyze() {
            const resumeFile = document.getElementById('resumeFile').files[0];
            const jdText = document.getElementById('jdText').value;

            if (!resumeFile) { alert('Please upload a resume PDF'); return; }
            if (!jdText.trim()) { alert('Please paste a job description'); return; }

            const checks = [];
            if (document.getElementById('checkAI').checked) checks.push('ai');
            if (document.getElementById('checkATS').checked) checks.push('ats');
            if (document.getElementById('checkHuman').checked) checks.push('human');
            if (checks.length === 0) { alert('Select at least one check'); return; }

            // Show loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('analyzeBtn').disabled = true;

            const formData = new FormData();
            formData.append('resume', resumeFile);
            formData.append('job_description', jdText);
            formData.append('checks', checks.join(','));

            try {
                const resp = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                renderResults(data);
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function renderResults(data) {
            const resultsDiv = document.getElementById('results');
            let html = '';

            // AI Detection
            if (data.ai_detection) {
                html += renderSection('AI Detection', 'Will this resume be flagged as AI-generated?', data.ai_detection);
            }

            // ATS Filter
            if (data.ats_filter) {
                html += renderSection('ATS Filter', 'Will this resume pass automated screening?', data.ats_filter);
            }

            // Human Screener
            if (data.human_screener) {
                html += renderSection('Human Screener', 'Would a recruiter call for an interview?', data.human_screener);
            }

            resultsDiv.innerHTML = html;
            resultsDiv.classList.add('active');
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function renderSection(title, subtitle, result) {
            let checksHtml = '';

            for (const [key, check] of Object.entries(result.checks)) {
                const scoreClass = getScoreClass(check.score);
                let extraHtml = '';

                // Keyword match data
                if (check.match_data) {
                    const md = check.match_data;
                    extraHtml += '<div class="keyword-tags">';
                    if (md.required_matched) {
                        md.required_matched.forEach(k => {
                            extraHtml += `<span class="tag matched">${k}</span>`;
                        });
                    }
                    if (md.required_missing) {
                        md.required_missing.forEach(k => {
                            extraHtml += `<span class="tag missing">✗ ${k}</span>`;
                        });
                    }
                    extraHtml += '</div>';
                }

                // Red flags
                if (check.flags && check.flags.length > 0) {
                    extraHtml += '<ul class="flags-list">';
                    check.flags.forEach(f => {
                        extraHtml += `<li>${f}</li>`;
                    });
                    extraHtml += '</ul>';
                }

                // Bullet examples
                if (check.examples) {
                    const ex = check.examples;
                    extraHtml += '<div class="examples">';
                    if (ex.great_examples && ex.great_examples.length > 0) {
                        extraHtml += '<p class="good">Strong: "' + ex.great_examples[0] + '"</p>';
                    }
                    if (ex.weak_examples && ex.weak_examples.length > 0) {
                        extraHtml += '<p class="bad">Weak: "' + ex.weak_examples[0] + '"</p>';
                    }
                    extraHtml += '</div>';
                }

                checksHtml += `
                    <div class="check-row">
                        <div class="check-name">${check.name}</div>
                        <div class="check-score ${scoreClass}">${check.score}%</div>
                        <div>
                            <div class="check-detail">${check.detail}</div>
                            ${extraHtml}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="result-section">
                    <div class="result-header" onclick="this.parentElement.querySelector('.result-body').classList.toggle('collapsed')">
                        <h2>
                            <span class="score-badge ${getBadgeClass(result.overall_score)}">${result.overall_score}%</span>
                            <span>
                                ${title}
                                <br><small style="font-weight:400;color:var(--gray-500)">${subtitle}</small>
                            </span>
                        </h2>
                    </div>
                    <div style="padding:0 20px">
                        <div class="verdict ${result.verdict_class}">${result.verdict}</div>
                    </div>
                    <div class="result-body">
                        ${checksHtml}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
